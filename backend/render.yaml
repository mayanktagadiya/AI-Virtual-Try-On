services:
  - type: web
    name: tryon-backend
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install uv && uv sync --frozen
    startCommand: uv run uvicorn app.main:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    envVars:
      - key: TRYON_PROVIDER
        value: huggingface
      - key: HF_TOKEN
        sync: false        # set manually in Render dashboard
      - key: GEMINI_API_KEY
        sync: false        # set manually in Render dashboard
      - key: FRONTEND_ORIGIN
        sync: false        # set to your Vercel URL after deploy
