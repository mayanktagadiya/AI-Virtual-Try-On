services:
  - type: web
    name: tryon-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install uv && uv sync --frozen
    startCommand: uv run uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: TRYON_PROVIDER
        value: stub
      - key: FRONTEND_ORIGIN
        value: https://tryon-mvp.vercel.app
